<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Neil Akobe 🎉</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Raleway:ital,wght@0,200;0,400;0,600;1,300&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Raleway', sans-serif;
            cursor: none;
        }

        #three-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .cursor {
            position: fixed;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: radial-gradient(circle, #00d4ff, #0055ff);
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 15px #00d4ff, 0 0 35px #0044ffaa;
        }

        #overlay {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            pointer-events: none;
            padding: 1rem;
        }

        .top-badge {
            font-size: clamp(0.6rem, 1.8vw, 0.95rem);
            letter-spacing: 0.55em;
            color: #00d4ff;
            text-transform: uppercase;
            opacity: 0;
            animation: fadeUp 1s 0.3s cubic-bezier(0.22, 1, 0.36, 1) forwards;
            margin-bottom: 0.5rem;
            text-shadow: 0 0 20px #00d4ffaa;
        }

        .title-main {
            font-family: 'Cinzel Decorative', serif;
            font-size: clamp(1.8rem, 4.5vw, 4.2rem);
            font-weight: 700;
            color: #FFD700;
            text-align: center;
            line-height: 1.1;
            opacity: 0;
            animation: fadeUp 1s 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
            filter: drop-shadow(0 0 28px #FFD70099) drop-shadow(0 0 70px #FF8C0044);
            margin-bottom: 0.2rem;
        }

        .name {
            font-family: 'Cinzel Decorative', serif;
            font-size: clamp(2.8rem, 8.5vw, 7.5rem);
            font-weight: 900;
            background-image: linear-gradient(90deg,
                    #ffffff 0%, #00d4ff 18%, #aaf0ff 36%,
                    #ffffff 50%, #00d4ff 68%, #aaf0ff 86%, #ffffff 100%);
            background-size: 300% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-align: center;
            opacity: 0;
            animation:
                fadeUp 1s 1.3s cubic-bezier(0.22, 1, 0.36, 1) forwards,
                nameShimmer 4s 2.4s linear infinite;
            filter: drop-shadow(0 0 35px #00d4ff77);
            line-height: 1.1;
            margin-bottom: 1.8rem;
        }

        @keyframes nameShimmer {
            0% {
                background-position: 0% center;
            }

            100% {
                background-position: 300% center;
            }
        }

        .cards {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.6rem;
            max-width: 720px;
            opacity: 0;
            animation: fadeUp 1s 2.1s cubic-bezier(0.22, 1, 0.36, 1) forwards;
            margin-bottom: 1.4rem;
        }

        .card {
            display: flex;
            align-items: center;
            gap: 0.45rem;
            background: rgba(0, 25, 55, 0.58);
            border: 1px solid rgba(0, 212, 255, 0.22);
            border-radius: 50px;
            padding: 0.45rem 1.15rem;
            font-size: clamp(0.62rem, 1.4vw, 0.84rem);
            color: rgba(255, 255, 255, 0.85);
            letter-spacing: 0.04em;

            -webkit-backdrop-filter: blur(14px);
            backdrop-filter: blur(14px);
        }

        .wish {
            font-style: italic;
            font-weight: 200;
            font-size: clamp(0.72rem, 1.8vw, 1.05rem);
            color: rgba(255, 255, 255, 0.42);
            letter-spacing: 0.22em;
            text-transform: uppercase;
            opacity: 0;
            animation: fadeUp 1s 3s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .emoji-float {
            position: fixed;
            animation: floatUp linear forwards;
            pointer-events: none;
            z-index: 5;
            -webkit-user-select: none;
            user-select: none;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) rotate(0deg) scale(1);
                opacity: 1;
            }

            85% {
                opacity: 0.7;
            }

            100% {
                transform: translateY(-115vh) rotate(380deg) scale(0.5);
                opacity: 0;
            }
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(0deg,
                    transparent, transparent 3px,
                    rgba(0, 0, 0, 0.035) 3px, rgba(0, 0, 0, 0.035) 4px);
            pointer-events: none;
            z-index: 8;
        }

        .corner {
            position: fixed;
            width: 75px;
            height: 75px;
            border-color: rgba(0, 212, 255, 0.28);
            border-style: solid;
            pointer-events: none;
            z-index: 11;
        }

        .corner-tl {
            top: 18px;
            left: 18px;
            border-width: 2px 0 0 2px;
        }

        .corner-tr {
            top: 18px;
            right: 18px;
            border-width: 2px 2px 0 0;
        }

        .corner-bl {
            bottom: 18px;
            left: 18px;
            border-width: 0 0 2px 2px;
        }

        .corner-br {
            bottom: 18px;
            right: 18px;
            border-width: 0 2px 2px 0;
        }

        .click-hint {
            position: fixed;
            top: 28px;
            left: 50%;
            transform: translateX(-50%);
            font-size: clamp(0.55rem, 1.2vw, 0.75rem);
            letter-spacing: 0.35em;
            color: rgba(0, 212, 255, 0.4);
            text-transform: uppercase;
            z-index: 12;
            opacity: 0;
            animation: fadeUp 1s 4s forwards;
            pointer-events: none;
        }

        .clickk {
            position: fixed;
            bottom: 28px;
            right: 50%;
            transform: translateX(-50%);
            font-size: clamp(0.55rem, 1.2vw, 0.75rem);
            letter-spacing: 0.35em;
            color: rgba(4, 170, 247, 0.4);
            text-transform: uppercase;
            z-index: 12;
            opacity: 0;
            animation: fadeUp 1s 4.5s forwards;
            pointer-events: auto;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="cursor" id="cursor"></div>

    <canvas id="three-canvas"></canvas>

    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>

    <div id="overlay">
        <div class="top-badge">✦ A Legendary Celebration For ✦</div>
        <div class="title-main">Happy Birthday</div>
        <div class="name">Neil Akobe</div>
        <div class="cards">
            <div class="card">💻 The IT Genius We All Admire</div>
            <div class="card">🏊 Pool Party King at Home</div>
            <div class="card">❤️ The Kindest Soul Around</div>
            <div class="card">⭐ Always There to Carry Us Higher</div>
            <div class="card">🎂 Today is All About You!</div>
        </div>
        <div class="wish">Wishing you the most legendary birthday ever</div>
    </div>

    <div class="click-hint">✦ Click anywhere for fireworks ✦</div>
    <button class="clickk"><a href="hbd2.html">✦ Click here for a surprise ✦</a></button>


    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const canvas = document.getElementById('three-canvas');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(70, innerWidth / innerHeight, 0.1, 1000);
        camera.position.set(0, 2, 9);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
        renderer.setSize(innerWidth, innerHeight);
        renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
        renderer.setClearColor(0x010918);

        (function () {
            const N = 4000;
            const pos = new Float32Array(N * 3);
            for (let i = 0; i < N; i++) {
                pos[i * 3] = (Math.random() - .5) * 250;
                pos[i * 3 + 1] = (Math.random() - .5) * 250;
                pos[i * 3 + 2] = (Math.random() - .5) * 250;
            }
            const geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            const mat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.18, sizeAttenuation: true, transparent: true, opacity: 0.75 });
            window._stars = new THREE.Points(geo, mat);
            scene.add(window._stars);
        })();

        const waterU = {
            uTime: { value: 0 },
            uColorA: { value: new THREE.Color(0x001530) },
            uColorB: { value: new THREE.Color(0x0055bb) },
            uColorC: { value: new THREE.Color(0x00ddff) },
        };
        const water = new THREE.Mesh(
            new THREE.PlaneGeometry(45, 45, 220, 220),
            new THREE.ShaderMaterial({
                uniforms: waterU,
                vertexShader: `
        uniform float uTime;
        varying vec2  vUv;
        varying float vE;
        void main(){
          vUv=uv;
          vec3 p=position;
          p.z = sin(p.x*.7+uTime*1.4)*.45
              + sin(p.y*1.1+uTime*.9)*.35
              + sin((p.x+p.y)*.4+uTime*2.1)*.2
              + sin(p.x*2.-uTime*1.7)*.1;
          vE=p.z;
          gl_Position=projectionMatrix*modelViewMatrix*vec4(p,1.);
        }`,
                fragmentShader: `
        uniform vec3  uColorA,uColorB,uColorC;
        uniform float uTime;
        varying vec2  vUv;
        varying float vE;
        void main(){
          float t=clamp((vE+1.)/2.,0.,1.);
          vec3 c=mix(uColorA,uColorB,t);
          c=mix(c,uColorC,pow(t,2.5));
          float sh=sin(vUv.x*28.+uTime*2.5)*sin(vUv.y*20.+uTime*2.);
          sh=max(sh,0.)*.28;
          c+=sh*vec3(.4,.85,1.);
          gl_FragColor=vec4(c,.78+t*.14);
        }`,
                transparent: true, side: THREE.DoubleSide,
            })
        );
        water.rotation.x = -Math.PI / 2;
        water.position.y = -3.5;
        scene.add(water);

        const globeU = { uTime: { value: 0 } };
        const globeGeo = new THREE.IcosahedronGeometry(1.8, 5);
        const globe = new THREE.Mesh(globeGeo, new THREE.ShaderMaterial({
            uniforms: globeU,
            vertexShader: `
      uniform float uTime;
      varying vec3 vN,vP;
      void main(){
        vN=normal; vP=position;
        vec3 p=position;
        float n=sin(p.x*3.+uTime)*sin(p.y*3.+uTime*1.3)*sin(p.z*3.+uTime*.7);
        p+=normal*n*.18;
        gl_Position=projectionMatrix*modelViewMatrix*vec4(p,1.);
      }`,
            fragmentShader: `
      uniform float uTime;
      varying vec3 vN;
      void main(){
        vec3 cA=vec3(0.,.35,.95);
        vec3 cB=vec3(0.,.95,.75);
        float fr=pow(1.-abs(dot(normalize(vN),vec3(0,0,1))),1.8);
        vec3 c=mix(cA,cB,fr);
        float pulse=sin(uTime*2.)*.5+.5;
        c+=pulse*.25*vec3(0.,.6,1.);
        gl_FragColor=vec4(c,.28+fr*.55);
      }`,
            transparent: true,
        }));
        globe.position.set(0, .3, -4);
        scene.add(globe);

        const wire = new THREE.Mesh(globeGeo,
            new THREE.MeshBasicMaterial({ color: 0x00aaff, wireframe: true, transparent: true, opacity: .11 }));
        wire.position.copy(globe.position);
        scene.add(wire);

        function makeOrbit(rx, ry, rz, col) {
            const pts = [];
            for (let i = 0; i <= 130; i++) {
                const a = i / 130 * Math.PI * 2;
                pts.push(new THREE.Vector3(Math.cos(a) * rx, Math.sin(a) * ry, Math.sin(a) * rz));
            }
            const l = new THREE.Line(
                new THREE.BufferGeometry().setFromPoints(pts),
                new THREE.LineBasicMaterial({ color: col, transparent: true, opacity: .32 })
            );
            l.position.copy(globe.position);
            scene.add(l);
            return l;
        }
        const orb1 = makeOrbit(2.7, .55, 2.7, 0x00d4ff);
        const orb2 = makeOrbit(2.3, 2.3, .5, 0x0066ff);
        const orb3 = makeOrbit(.5, 2.1, 2.1, 0x00ffcc);

        const FP = 650;
        const fpPos = new Float32Array(FP * 3);
        const fpCol = new Float32Array(FP * 3);
        const pal = [
            new THREE.Color(0xFFD700), new THREE.Color(0x00FFFF),
            new THREE.Color(0xFF69B4), new THREE.Color(0x98FF98),
            new THREE.Color(0xffffff), new THREE.Color(0xFF4500),
        ];
        for (let i = 0; i < FP; i++) {
            fpPos[i * 3] = (Math.random() - .5) * 22;
            fpPos[i * 3 + 1] = (Math.random() - .5) * 12;
            fpPos[i * 3 + 2] = (Math.random() - .5) * 12;
            const c = pal[i % pal.length];
            fpCol[i * 3] = c.r; fpCol[i * 3 + 1] = c.g; fpCol[i * 3 + 2] = c.b;
        }
        const fpGeo = new THREE.BufferGeometry();
        fpGeo.setAttribute('position', new THREE.BufferAttribute(fpPos, 3));
        fpGeo.setAttribute('color', new THREE.BufferAttribute(fpCol, 3));
        scene.add(new THREE.Points(fpGeo,
            new THREE.PointsMaterial({ size: .075, sizeAttenuation: true, vertexColors: true, transparent: true, opacity: .82 })
        ));

        const FWS = [];

        function Firework() {
            this.done = false;
            this.burst = false;
            this.life = 0;
            this.frames = 35 + Math.floor(Math.random() * 15);
            this.ox = (Math.random() - .5) * 18;
            this.oy = -6;
            this.oz = (Math.random() - .5) * 6 - 3;
            this.ty = 2.5 + Math.random() * 4;

            const hue = Math.random();
            this.col = new THREE.Color().setHSL(hue, 1, .62);
            const col2 = new THREE.Color().setHSL((hue + .15) % 1, 1, .8);


            const tg = new THREE.BufferGeometry();
            tg.setAttribute('position', new THREE.BufferAttribute(new Float32Array([this.ox, this.oy, this.oz]), 3));
            this.trailPt = new THREE.Points(tg, new THREE.PointsMaterial({ color: this.col, size: .35 }));
            scene.add(this.trailPt);

            const cnt = 100 + Math.floor(Math.random() * 60);
            this.bPos = new Float32Array(cnt * 3);
            this.bVel = [];
            for (let i = 0; i < cnt; i++) {
                this.bPos[i * 3] = this.ox; this.bPos[i * 3 + 1] = this.ty; this.bPos[i * 3 + 2] = this.oz;
                const th = Math.random() * Math.PI * 2, ph = Math.random() * Math.PI;
                const sp = .04 + Math.random() * .12;
                this.bVel.push({
                    x: Math.sin(ph) * Math.cos(th) * sp,
                    y: Math.sin(ph) * Math.sin(th) * sp * .65 + .025,
                    z: Math.cos(ph) * sp * .3,
                    g: .0012 + Math.random() * .001,
                });
            }
            const bg = new THREE.BufferGeometry();
            bg.setAttribute('position', new THREE.BufferAttribute(this.bPos, 3));
            this.burstPt = new THREE.Points(bg, new THREE.PointsMaterial({
                color: Math.random() > .5 ? this.col : col2,
                size: .13, transparent: true, opacity: 1, sizeAttenuation: true,
            }));
            this.burstPt.visible = false;
            scene.add(this.burstPt);
            this.bLife = 0; this.bMax = 55 + Math.floor(Math.random() * 35);
        }

        Firework.prototype.update = function () {
            this.life++;
            if (!this.burst) {
                const p = this.life / this.frames;
                const cy = this.oy + (this.ty - this.oy) * p;
                const a = this.trailPt.geometry.attributes.position;
                a.setXYZ(0, this.ox, cy, this.oz);
                a.needsUpdate = true;
                if (this.life >= this.frames) {
                    scene.remove(this.trailPt);
                    this.burst = true;
                    this.burstPt.visible = true;
                }
            } else {
                this.bLife++;
                this.burstPt.material.opacity = Math.max(0, 1 - this.bLife / this.bMax);
                for (let i = 0; i < this.bVel.length; i++) {
                    this.bPos[i * 3] += this.bVel[i].x;
                    this.bPos[i * 3 + 1] += this.bVel[i].y;
                    this.bPos[i * 3 + 2] += this.bVel[i].z;
                    this.bVel[i].y -= this.bVel[i].g;
                }
                this.burstPt.geometry.attributes.position.needsUpdate = true;
                if (this.bLife >= this.bMax) { scene.remove(this.burstPt); this.done = true; }
            }
        };

        scene.add(new THREE.AmbientLight(0x001133, 2));
        const pL = new THREE.PointLight(0x00aaff, 3, 30);
        pL.position.set(0, 6, 2);
        scene.add(pL);
        const gL = new THREE.PointLight(0xFFD700, 1.5, 22);
        gL.position.set(-5, 3, 5);
        scene.add(gL);


        const cursorEl = document.getElementById('cursor');
        window.addEventListener('mousemove', e => {
            cursorEl.style.left = e.clientX + 'px';
            cursorEl.style.top = e.clientY + 'px';
        });

        window.addEventListener('click', () => {
            for (let i = 0; i < 3; i++) setTimeout(() => FWS.push(new Firework()), i * 200);
        });

        let t = 0, fwT = 0;
        function animate() {
            requestAnimationFrame(animate);
            t += .012;

            waterU.uTime.value = t;
            globeU.uTime.value = t;

            globe.rotation.y = t * .28;
            globe.rotation.x = t * .09;
            wire.rotation.y = t * .28;
            wire.rotation.x = t * .09;
            const gs = 1 + Math.sin(t * 2.2) * .04;
            globe.scale.setScalar(gs);
            wire.scale.setScalar(gs);

            orb1.rotation.z = t * .7;
            orb2.rotation.x = t * .5;
            orb3.rotation.y = t * .6;

            window._stars.rotation.y = t * .015;
            window._stars.rotation.x = t * .004;

            const pp = fpGeo.attributes.position;
            for (let i = 0; i < FP; i++) {
                pp.setY(i, pp.getY(i) + Math.sin(t + i * .13) * .002);
                pp.setX(i, pp.getX(i) + Math.cos(t * .6 + i * .07) * .001);
            }
            pp.needsUpdate = true;

            pL.intensity = 2.5 + Math.sin(t * 3) * .8;

            camera.position.x = Math.sin(t * .25) * .6;
            camera.position.y = 2 + Math.sin(t * .18) * .4;
            camera.lookAt(0, 0, 0);

            fwT++;
            if (fwT >= 55) { FWS.push(new Firework()); if (Math.random() > .55) FWS.push(new Firework()); fwT = 0; }
            for (let i = FWS.length - 1; i >= 0; i--) { FWS[i].update(); if (FWS[i].done) FWS.splice(i, 1); }

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = innerWidth / innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(innerWidth, innerHeight);
        });
    </script>
</body>

</html>
